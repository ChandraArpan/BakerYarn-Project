<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>BakerYarn Login</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Noto+Sans:wght@400;500;600;700&family=WindSong:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      background:linear-gradient(to bottom right,#ffe4e6,#ffd3d7,#fff1f2);
      font-family:"Noto Sans",sans-serif;
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }

    /* ══════════════════════════════
       TOP BAR
    ══════════════════════════════ */

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:24px 60px;
    }

    /* LOGO */

    .company-name{
      display:flex;
      flex-direction:column;
      line-height:0.9;
      color:#ff5d73;
    }

    .sign-1{
      font-family:"Faculty Glyphic",serif;
      font-size:2rem;
    }

    .sign-2{
      font-family:"WindSong",cursive;
      font-size:3.2rem;
      margin-left:42px;
      margin-top:-5px;
    }

    /* HOME BUTTON */

    .home-btn{
      text-decoration:none;
      color:#ff5d73;
      font-size:1rem;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:8px;
      transition:0.3s;
    }

    .home-btn:hover{
      transform:translateX(-3px);
      color:#ff4363;
    }

    /* ══════════════════════════════
       LOGIN SECTION
    ══════════════════════════════ */

    .login-wrapper{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .login-card{

      width:100%;
      max-width:440px;

      background:rgba(255,255,255,0.68);

      backdrop-filter:blur(14px);

      border-radius:32px;

      padding:48px 42px;

      box-shadow:0 14px 34px rgba(0,0,0,0.10);

      border:1px solid rgba(255,255,255,0.4);
    }

    /* LOGIN TEXT */

    .login-title{
      text-align:center;
      color:#ff5d73;
      font-size:2.3rem;
      font-weight:700;
      margin-bottom:10px;
    }

    .login-subtitle{
      text-align:center;
      color:#7b5b5b;
      font-size:0.98rem;
      margin-bottom:34px;
      line-height:1.7;
    }

    /* INPUTS */

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#6b4c4c;
      font-weight:600;
      font-size:0.95rem;
    }

    .input-group input{

      width:100%;

      padding:15px 18px;

      border:none;

      border-radius:18px;

      background:#fff5f5;

      outline:none;

      font-size:1rem;

      transition:0.3s;
    }

    .input-group input:focus{
      box-shadow:0 0 0 3px rgba(255,93,115,0.16);
    }

    /* LOGIN BUTTON */

    .login-btn{

      width:100%;

      padding:15px;

      border:none;

      border-radius:18px;

      background:#ff5d73;

      color:white;

      font-size:1rem;

      font-weight:700;

      cursor:pointer;

      transition:0.3s;

      margin-top:10px;

      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .login-btn:hover{
      background:#ff4363;
      transform:translateY(-2px);
    }

    /* EXTRA LINKS */

    .extra-links{
      margin-top:24px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .extra-links a{
      text-decoration:none;
      color:#d25567;
      font-size:0.92rem;
      font-weight:600;
      transition:0.3s;
    }

    .extra-links a:hover{
      color:#ff4363;
      text-decoration:underline;
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */

    @media(max-width:768px){

      .top-bar{
        padding:20px;
      }

      .login-card{
        padding:38px 28px;
      }

      .sign-1{
        font-size:1.8rem;
      }

      .sign-2{
        font-size:2.7rem;
      }

      .login-title{
        font-size:2rem;
      }

    }

  </style>

</head>

<body>

  <!-- ══════════════════════════════
       TOP BAR
  ══════════════════════════════ -->

  <div class="top-bar">

    <!-- LOGO -->

    <div class="company-name">

      <div class="sign-1">
        BAKER
      </div>

      <div class="sign-2">
        Yarn
      </div>

    </div>

    <!-- BACK TO HOME -->

    <a
      href="homepage.html"
      class="home-btn"
    >
      ← Home
    </a>

  </div>

  <!-- ══════════════════════════════
       LOGIN CARD
  ══════════════════════════════ -->

  <div class="login-wrapper">

    <div class="login-card">

      <h1 class="login-title">
        Welcome Back
      </h1>

      <p class="login-subtitle">
        Log in to continue your sweet journey with BakerYarn.
      </p>

      <!-- FORM -->

      <form action="after sign in page.html">

        <!-- EMAIL -->

        <div class="input-group">

          <label>
            Email
          </label>

          <input
            type="email"
            placeholder="Enter your email"
          >

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

          <label>
            Password
          </label>

          <input
            type="password"
            placeholder="Enter your password"
          >

        </div>

        <!-- BUTTON -->

        <button
          type="submit"
          class="login-btn"
        >
          Log In
        </button>

      </form>

      <!-- EXTRA LINKS -->

      <div class="extra-links">

        <a href="#">
          Forgot Password?
        </a>

        <a href="#">
          Create Account
        </a>

      </div>

    </div>

  </div>

</body>
</html>
